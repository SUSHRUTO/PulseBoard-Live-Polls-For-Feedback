services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pollpulse
      POSTGRES_PASSWORD: pollpulse
      POSTGRES_DB: pollpulse
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  postgres_data:
